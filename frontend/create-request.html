<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Post a Request — Bayanihan Connect</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-card { max-width:640px; margin:0 auto; }
    .urgency-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px; }
    .urgency-opt { border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s; }
    .urgency-opt input { display:none; }
    .urgency-opt label { font-size:13px;font-weight:700;display:block;cursor:pointer;margin-bottom:4px; }
    .urgency-opt small { font-size:11px;color:var(--text-light);display:block; }
    .urgency-opt.low:has(input:checked)      { border-color:#66BB6A;background:#E8F5E9; }
    .urgency-opt.medium:has(input:checked)   { border-color:var(--gold);background:#FFF8E1; }
    .urgency-opt.high:has(input:checked)     { border-color:#FF7043;background:#FBE9E7; }
    .urgency-opt.critical:has(input:checked) { border-color:var(--red);background:#FCE4EC; }
    .img-preview { width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius);margin-top:10px;display:none; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"><img src="images/LOGO.png" alt="Bayanihan Connect Logo" class="nav-logo-icon"><div class="nav-logo-text"><span class="brand-name">Bayanihan Connect</span></div></a>
  <ul class="nav-links" id="nav-links">
    <li><a href="requests.html">Browse Requests</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><div class="dropdown"><div id="nav-avatar" style="cursor:pointer"></div>
      <div class="dropdown-menu" id="user-dd"><a href="profile.html">Profile</a><hr class="separator"><button onclick="Auth.logout()">Sign Out</button></div>
    </div></li>
  </ul>
</nav>

<div class="page-container">
  <a href="requests.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-mid);font-size:14px;margin-bottom:20px;font-weight:500">← Back to Requests</a>

  <div class="form-card">
    <div class="page-header" style="margin-bottom:24px">
      <div>
        <h1 class="page-title" id="page-heading">Post a Help Request</h1>
        <p class="page-subtitle">Describe what you need and your community will respond</p>
      </div>
    </div>

    <div class="card">
      <form id="request-form" enctype="multipart/form-data">
        <div class="form-group">
          <label class="form-label">Request Title *</label>
          <input type="text" class="form-control" id="title" placeholder="e.g. Need help transporting elderly parent to hospital" required maxlength="255">
          <div class="form-hint">Be specific and clear — helpers should understand your need at a glance.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea class="form-control" id="description" rows="5" placeholder="Explain your situation in detail. Include when you need help, any special requirements, etc." required></textarea>
        </div>

        <div class="grid-2" style="gap:16px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Category *</label>
            <select class="form-control" id="category_id" required>
              <option value="">Select category</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" id="location" placeholder="e.g. Poblacion, Davao City">
          </div>
        </div>

        <div class="form-group" style="margin-top:20px">
          <label class="form-label">Urgency Level *</label>
          <div class="urgency-grid">
            <div class="urgency-opt low"><input type="radio" name="urgency" value="low" id="u-low"><label for="u-low">Low</label><small>Flexible timing</small></div>
            <div class="urgency-opt medium"><input type="radio" name="urgency" value="medium" id="u-med" checked><label for="u-med">Medium</label><small>Within a few days</small></div>
            <div class="urgency-opt high"><input type="radio" name="urgency" value="high" id="u-high"><label for="u-high">High</label><small>Needed soon</small></div>
            <div class="urgency-opt critical"><input type="radio" name="urgency" value="critical" id="u-crit"><label for="u-crit">Critical</label><small>Urgent/Emergency</small></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Attach Photo (optional)</label>
          <input type="file" class="form-control" id="image" accept="image/*" onchange="previewImage(event)">
          <img id="img-preview" class="img-preview" alt="Preview">
        </div>

        <div id="form-error" class="form-error" style="display:none;margin-bottom:12px"></div>

        <div style="display:flex;gap:12px;margin-top:8px">
          <button type="button" class="btn btn-outline" onclick="history.back()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">Post Request</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="loading-overlay"><div class="spinner"></div></div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  Auth.requireAuth();
  const user  = Auth.getUser();
  const editId = new URLSearchParams(location.search).get('id');

  // Nav
  const av = document.getElementById('nav-avatar');
  av.innerHTML = UI.avatar(user.profile_picture, user.name, 36);
  av.addEventListener('click', () => document.getElementById('user-dd').classList.toggle('open'));
  document.addEventListener('click', e => { if (!e.target.closest('.dropdown')) document.getElementById('user-dd').classList.remove('open'); });

  // Load categories
  async function loadCategories() {
    const { data } = await api.categories();
    const sel = document.getElementById('category_id');
    (data.categories || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }

  // Edit mode
  async function loadEditData() {
    if (!editId) return;
    document.getElementById('page-heading').textContent = 'Edit Help Request';
    document.getElementById('submit-btn').textContent   = 'Update Request';
    const { ok, data } = await api.getRequest(editId);
    if (!ok || data.request.user_id !== user.id) { window.location.href = 'dashboard.html'; return; }
    const r = data.request;
    document.getElementById('title').value       = r.title;
    document.getElementById('description').value = r.description;
    document.getElementById('location').value    = r.location || '';
    document.getElementById('category_id').value = r.category_id;
    const urgencyEl = document.querySelector(`input[name="urgency"][value="${r.urgency_level}"]`);
    if (urgencyEl) urgencyEl.checked = true;
    if (r.image_url) {
      const prev = document.getElementById('img-preview');
      prev.src = 'http://localhost:5000' + r.image_url;
      prev.style.display = 'block';
    }
  }

  function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const prev = document.getElementById('img-preview');
    prev.src = URL.createObjectURL(file);
    prev.style.display = 'block';
  }

  document.getElementById('request-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const errEl = document.getElementById('form-error');
    btn.disabled = true; btn.textContent = editId ? 'Updating...' : 'Posting...';
    errEl.style.display = 'none';

    const fd = new FormData();
    fd.append('title',         document.getElementById('title').value);
    fd.append('description',   document.getElementById('description').value);
    fd.append('category_id',   document.getElementById('category_id').value);
    fd.append('location',      document.getElementById('location').value);
    fd.append('urgency_level', document.querySelector('input[name="urgency"]:checked').value);
    const img = document.getElementById('image').files[0];
    if (img) fd.append('image', img);

    try {
      const { ok, data } = editId ? await api.updateRequest(editId, fd) : await api.createRequest(fd);
      if (ok) {
        UI.toast(editId ? 'Request updated!' : 'Request posted!');
        window.location.href = editId ? `request-detail.html?id=${editId}` : 'dashboard.html';
      } else {
        errEl.textContent = data.message || 'Failed';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = editId ? 'Update Request' : 'Post Request';
      }
    } catch(e) {
      errEl.textContent = 'Connection error';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = editId ? 'Update Request' : 'Post Request';
    }
  });

  loadCategories().then(loadEditData);
</script>
</body>
</html>
